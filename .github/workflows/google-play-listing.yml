name: Google Play Store Listing

on:
  workflow_dispatch:
    inputs:
      app:
        description: Which game?
        required: true
        default: habibirun
        type: choice
        options:
          - habibirun
          - voidstack
          - voiddash
      action:
        description: What should the workflow do?
        required: true
        default: api-check
        type: choice
        options:
          - validate
          - api-check
          - export
          - publish

permissions:
  contents: read

jobs:
  listing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Google API client
        if: inputs.action != 'validate'
        run: python -m pip install --disable-pip-version-check google-api-python-client google-auth

      - name: Validate, export, or update listing
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: python play-listing/scripts/google_play_listing.py "${{ inputs.app }}" "${{ inputs.action }}"

      - name: Upload exported listing
        if: inputs.action == 'export'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app }}-play-listing
          path: listing-export/${{ inputs.app }}
          retention-days: 7
