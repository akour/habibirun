name: Google Play Store Listing

on:
  workflow_dispatch:
    inputs:
      action:
        description: What should the workflow do?
        required: true
        default: api-check
        type: choice
        options:
          - validate
          - api-check
          - publish

permissions:
  contents: read

jobs:
  listing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Google API client
        if: inputs.action != 'validate'
        run: python -m pip install --disable-pip-version-check google-api-python-client google-auth

      - name: Validate or update listing
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: python play-listing/scripts/google_play_listing.py "${{ inputs.action }}"
