name: Export Void Stack Listing Once\n\n# Approved one-time public listing export\n# Retry after export routing fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/export-voidstack-once.yml

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Google API client
        run: python -m pip install --disable-pip-version-check google-api-python-client google-auth

      - name: Export existing public Void Stack listing
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: python play-listing/scripts/google_play_listing.py voidstack export

      - name: Upload temporary listing artifact
        uses: actions/upload-artifact@v4
        with:
          name: voidstack-play-listing
          path: listing-export/voidstack
          retention-days: 7
